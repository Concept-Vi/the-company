<title>The Company — Operator Console</title>
<style>
  :root{
    --ground:#0b0f17; --ground-2:#0e1320; --panel:#131a27; --panel-2:#18202e; --panel-3:#1d2636;
    --line:#26303f; --line-bright:#3a465c; --line-faint:#1b232f;
    --ink:#e9e6dd; --ink-dim:#98a1b3; --ink-faint:#5e6675;
    --t-code:#4f7390; --t-local:#54a6c4; --t-embed:#62b9b4; --t-claude:#8fae9a; --t-cloud:#cf9f63; --t-tim:#f0b65a;
    --signal:#5fc6d6; --gold:#f0b65a; --whole:#5fc09a; --fray:#dd6a5e; --violet:#b48cf0;
    --r:7px;
    --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,"Segoe UI",system-ui,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-bright);border-radius:5px}::-webkit-scrollbar-track{background:transparent}
  .app{display:grid;grid-template-columns:236px 1fr;height:100vh}
  /* ── rail ── */
  .rail{background:var(--ground-2);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .brand{padding:16px 18px 13px;border-bottom:1px solid var(--line-faint);display:flex;align-items:center;gap:10px}
  .orb{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold),#9a6a22 68%,#3a2a10);box-shadow:0 0 16px rgba(240,182,90,.45);flex:none;cursor:pointer}
  .orb.pulse{animation:orbp 3s ease-in-out infinite}
  @keyframes orbp{0%,100%{box-shadow:0 0 16px rgba(240,182,90,.4)}50%{box-shadow:0 0 22px rgba(240,182,90,.7)}}
  .brand h1{font-size:14px;margin:0;font-weight:600;letter-spacing:.01em}
  .brand .sub{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.03em;margin-top:2px}
  nav{padding:6px 10px 10px;display:flex;flex-direction:column;gap:1px;flex:1;min-height:0;overflow:auto}
  .nav-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);padding:13px 10px 5px}
  .navi{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:var(--r);cursor:pointer;color:var(--ink-dim);border:1px solid transparent;position:relative}
  .navi:hover{background:var(--panel);color:var(--ink)}
  .navi.on{background:var(--panel-2);color:var(--ink);border-color:var(--line-bright)}
  .navi.on::before{content:"";position:absolute;left:-10px;top:7px;bottom:7px;width:3px;border-radius:2px;background:var(--gold)}
  .navi .ico{width:17px;height:17px;flex:none;opacity:.92}
  .navi .txt{display:flex;flex-direction:column;min-width:0}
  .navi .nm{font-size:13px;font-weight:500;line-height:1.25}
  .navi .gloss{font-size:9.5px;color:var(--ink-faint);font-family:var(--mono)}
  .badge{margin-left:auto;font-family:var(--mono);font-size:9.5px;background:var(--fray);color:#1a0e0c;border-radius:20px;padding:1px 7px;font-weight:700}
  .badge.cool{background:var(--signal);color:#04181c}.badge.live{background:var(--whole);color:#04140d}
  .rail-foot{border-top:1px solid var(--line-faint);padding:11px 12px;display:flex;flex-direction:column;gap:9px}
  .reg-toggle{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:3px;font-family:var(--mono);font-size:10px}
  .reg-toggle button{flex:1;background:none;border:0;color:var(--ink-faint);padding:6px 4px;border-radius:5px;cursor:pointer}
  .reg-toggle button.on{background:var(--panel-2);color:var(--ink)}
  .kbd{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);display:flex;justify-content:space-between}
  .kbd kbd{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:var(--ink-dim)}
  /* ── main ── */
  .main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .topbar{height:50px;flex:none;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 20px;background:linear-gradient(180deg,var(--ground-2),var(--ground))}
  .crumb{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim)}.crumb b{color:var(--ink);font-weight:600}
  .legend{display:flex;align-items:center;font-family:var(--mono);font-size:9px}
  .legend .lab{color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;margin-right:8px}
  .tier-chip{width:30px;height:7px}.tier-chip:first-of-type{border-radius:4px 0 0 4px}.tier-chip:last-of-type{border-radius:0 4px 4px 0}
  .micro{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .vram{margin-left:auto;display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  .vram .bar{width:90px;height:8px;background:var(--panel);border:1px solid var(--line);border-radius:5px;overflow:hidden;display:flex}
  .vram .seg{height:100%}
  .gstate{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);padding-left:14px;border-left:1px solid var(--line);cursor:pointer}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--whole);box-shadow:0 0 8px var(--whole)}
  .stage{flex:1;min-height:0;overflow:auto;position:relative}
  .stage-pad{padding:20px 22px}
  .room-head{display:flex;align-items:flex-end;gap:13px;margin-bottom:3px}
  .room-head h2{font-size:21px;margin:0;font-weight:600;letter-spacing:-.01em}
  .room-head .k{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.05em;padding-bottom:4px}
  .room-head .ask{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--signal);border:1px solid var(--line-bright);background:var(--panel);border-radius:20px;padding:5px 12px;cursor:pointer}
  .room-head .ask:hover{border-color:var(--signal)}
  .room-sub{color:var(--ink-dim);max-width:72ch;margin:0 0 16px;font-size:13px}
  .room-sub code{font-family:var(--mono);font-size:12px;color:var(--signal);background:var(--panel);padding:1px 5px;border-radius:4px}
  /* canvas */
  .canvas-wrap{position:relative;background:radial-gradient(130% 130% at 50% 0%,#10182680,#0a0e16);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  canvas{display:block;width:100%}
  .overlay-ui{position:absolute;display:flex;gap:6px;z-index:3}
  .pill{font-family:var(--mono);font-size:11px;background:rgba(19,26,39,.84);border:1px solid var(--line-bright);color:var(--ink-dim);padding:6px 11px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px)}
  .pill:hover{color:var(--ink)}
  .pill.on{background:var(--signal);color:#04181c;border-color:var(--signal);font-weight:600}
  .pill.warm.on{background:var(--gold);color:#1a0e02;border-color:var(--gold)}
  .runbtn{font-family:var(--mono);font-size:12px;background:var(--gold);color:#1a0e02;border:0;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:700}
  .runbtn.cool{background:var(--signal);color:#04181c}.runbtn:disabled{opacity:.5;cursor:default}
  .tip{position:absolute;pointer-events:none;background:rgba(11,15,23,.96);border:1px solid var(--line-bright);border-radius:8px;padding:9px 11px;font-size:12px;max-width:230px;opacity:0;transition:opacity .12s;z-index:6}
  .tip .a{font-family:var(--mono);font-size:10px;color:var(--signal);display:block;margin-bottom:3px}
  .tip .rel{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:5px}
  .hud{position:absolute;right:12px;top:12px;background:rgba(11,15,23,.82);border:1px solid var(--line);border-radius:8px;padding:11px 13px;font-family:var(--mono);font-size:11px;min-width:166px;backdrop-filter:blur(6px);z-index:3}
  .hud .row{display:flex;justify-content:space-between;gap:14px;padding:2px 0;color:var(--ink-dim)}
  .hud .row b{color:var(--ink);font-variant-numeric:tabular-nums}
  /* drill panel (map focus) */
  .drill{position:absolute;right:0;top:0;bottom:0;width:310px;background:rgba(13,18,28,.97);border-left:1px solid var(--line-bright);padding:16px;overflow:auto;transform:translateX(100%);transition:transform .22s;z-index:7;backdrop-filter:blur(8px)}
  .drill.open{transform:none}
  .drill h3{margin:0 0 2px;font-size:16px}
  .drill .da{font-family:var(--mono);font-size:10.5px;color:var(--signal);margin-bottom:14px;word-break:break-all}
  .drill .sec{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:15px 0 7px}
  .proj{display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--line-faint);font-size:12px}
  .proj .pl{font-family:var(--mono);font-size:9.5px;color:var(--gold);width:78px;flex:none}
  .navbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px}
  .navbtns button{font-family:var(--mono);font-size:10.5px;background:var(--panel-2);border:1px solid var(--line-bright);color:var(--ink-dim);padding:7px;border-radius:6px;cursor:pointer}
  .navbtns button:hover{color:var(--ink);border-color:var(--signal)}
  .drill .close{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--ink-faint);font-size:18px}
  .mk{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px;background:var(--panel-2);margin:0 5px 5px 0}
  /* generic cards/grid */
  .grid{display:grid;gap:13px}.cols-2{grid-template-columns:1fr 1fr}.cols-3{grid-template-columns:1fr 1fr 1fr}.cols-4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .card .ch{padding:12px 15px;border-bottom:1px solid var(--line-faint);display:flex;align-items:center;gap:9px}
  .card .ch .t{font-weight:600;font-size:13px}.card .ch .k{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:auto}
  .card .cb{padding:13px 15px}
  .stripe{border-left:3px solid var(--line-bright)}.stripe.fray{border-left-color:var(--fray)}.stripe.gold{border-left-color:var(--gold)}.stripe.whole{border-left-color:var(--whole)}.stripe.cool{border-left-color:var(--signal)}.stripe.violet{border-left-color:var(--violet)}
  .metric{display:flex;flex-direction:column;gap:2px}.metric .big{font-size:28px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}.metric .ml{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase}
  /* bench */
  .scarce{font-family:var(--mono);font-size:10.5px;color:var(--gold);display:flex;align-items:center;gap:8px;margin:0 0 14px;padding:9px 13px;background:rgba(240,182,90,.07);border:1px solid rgba(240,182,90,.2);border-radius:8px}
  .bench-item{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:8px;padding:13px 15px;margin-bottom:11px;transition:opacity .3s}
  .bench-item.done{opacity:.45;border-left-color:var(--whole)}
  .bi-top{display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap}
  .kind{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:rgba(240,182,90,.13);color:var(--gold)}
  .kind.find{background:rgba(221,106,94,.13);color:var(--fray)}.kind.mark{background:rgba(95,198,214,.12);color:var(--signal)}.kind.twin{background:rgba(180,140,240,.14);color:var(--violet)}
  .posture{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--ink-faint);margin-left:auto;border:1px solid var(--line);border-radius:20px;padding:1px 8px}
  .bi-claim{font-size:14px;font-weight:500;margin:0 0 3px}
  .bi-ev{font-size:12px;color:var(--ink-dim);font-family:var(--mono);background:var(--ground-2);border:1px solid var(--line-faint);border-radius:6px;padding:8px 10px;margin:7px 0}
  .bi-ev .lbl{color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;font-size:8.5px;display:block;margin-bottom:3px}
  .bi-acts{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .act{font-family:var(--mono);font-size:11px;border:1px solid var(--line-bright);background:var(--panel-2);color:var(--ink-dim);padding:6px 12px;border-radius:6px;cursor:pointer}
  .act.go{border-color:var(--whole);color:var(--whole)}.act.go:hover{background:rgba(95,192,154,.12)}.act.no:hover{border-color:var(--fray);color:var(--fray)}.act:hover{color:var(--ink)}
  .rhm-bubble{display:flex;gap:10px;align-items:flex-start;background:rgba(240,182,90,.05);border:1px solid rgba(240,182,90,.18);border-radius:8px;padding:10px 12px;margin:6px 0 0;font-size:12.5px}
  .rhm-bubble .o{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--gold),#9a6a22);flex:none;margin-top:1px}
  /* loom */
  .loom{display:grid;grid-template-columns:172px 1fr 240px;gap:12px}
  .palette-n .pn{font-family:var(--mono);font-size:11px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:var(--panel);margin-bottom:7px;cursor:grab;display:flex;align-items:center;gap:8px}
  .palette-n .pn .vd{width:7px;height:7px;border-radius:2px}
  .shelf .sh-item{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);margin-bottom:8px;cursor:pointer}
  .shelf .sh-item:hover{border-color:var(--line-bright)}.shelf .sh-item.on{border-color:var(--gold);background:var(--panel-2)}
  .sh-item .nm{font-weight:600;font-size:13px}.sh-item .ds{font-size:10.5px;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}.sh-item .tg{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--signal);margin-top:5px}
  .loom-canvas{background:radial-gradient(130% 130% at 50% 0%,#10182680,#0a0e16);border:1px solid var(--line);border-radius:10px;position:relative;min-height:360px;overflow:hidden}
  .loom-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line-faint) 1px,transparent 1px),linear-gradient(90deg,var(--line-faint) 1px,transparent 1px);background-size:25px 25px;opacity:.4}
  .lnode{position:absolute;background:var(--panel-2);border:1px solid var(--line-bright);border-radius:9px;padding:10px 12px;width:140px;cursor:pointer;z-index:2}
  .lnode:hover,.lnode.sel{border-color:var(--gold)}
  .lnode .vrb{font-family:var(--mono);font-size:9.5px;color:var(--signal)}.lnode .lbl2{font-size:12.5px;font-weight:600;margin-top:2px}.lnode .cfg{font-size:9.5px;color:var(--ink-faint);font-family:var(--mono);margin-top:3px}.lnode .tband{height:4px;border-radius:3px;margin-top:7px}
  .inspect{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .frow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line-faint);font-size:12px}
  .frow .fl{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .frow select,.frow .val{font-family:var(--mono);font-size:11px;background:var(--panel-2);border:1px solid var(--line-bright);color:var(--ink);border-radius:5px;padding:3px 8px}
  /* pulse extras */
  .seam{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-faint);font-size:12.5px}.seam:last-child{border:0}
  .seam .sd{width:8px;height:8px;border-radius:50%;flex:none}.seam .sa{font-family:var(--mono);font-size:10.5px;margin-left:auto}
  .st{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:1px 8px;border-radius:20px}
  .prize{background:linear-gradient(135deg,rgba(221,106,94,.1),rgba(95,198,214,.08));border:1px solid var(--line-bright)}
  .prize .cb{display:flex;gap:15px;align-items:center;flex-wrap:wrap}.prize .vs{font-family:var(--mono);font-size:11px;text-align:center}.prize .vs b{display:block;font-size:13px;margin-bottom:3px}
  .det-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-faint);font-size:12px}.det-row:last-child{border:0}
  .tierlab{font-family:var(--mono);font-size:9px;padding:1px 7px;border-radius:4px;letter-spacing:.04em}
  .calib td,.calib th{text-align:left;padding:7px 10px;font-size:11.5px;border-bottom:1px solid var(--line-faint)}.calib th{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}.calib{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  .calib tr.win{background:rgba(95,192,154,.07)}
  .adr-log{font-family:var(--mono);font-size:11px}.adr-log .e{padding:8px 0;border-bottom:1px solid var(--line-faint)}.adr-log .e:last-child{border:0}.adr-log .who{color:var(--gold)}.adr-log .when{color:var(--ink-faint)}
  /* cast */
  .cast-grid{display:grid;grid-template-columns:1fr 320px;gap:13px}
  .roles{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:9px}
  .role{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 11px;position:relative;transition:border-color .2s,background .2s}
  .role.firing{border-color:var(--signal);background:var(--panel-2);box-shadow:0 0 12px rgba(95,198,214,.25)}
  .role.ran{border-color:var(--whole)}
  .role .rn{font-size:12.5px;font-weight:600}.role .rr2{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);margin-top:2px}
  .role .rs{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--line-bright)}
  .role.firing .rs{background:var(--signal);animation:blink 1s infinite}.role.ran .rs{background:var(--whole)}
  @keyframes blink{50%{opacity:.3}}
  .dial{margin-bottom:13px}.dial .dl{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
  .dial-opts{display:flex;gap:5px}.dial-opts button{flex:1;font-family:var(--mono);font-size:10.5px;background:var(--panel);border:1px solid var(--line);color:var(--ink-faint);padding:7px 4px;border-radius:6px;cursor:pointer}.dial-opts button.on{border-color:var(--gold);color:var(--gold);background:var(--panel-2)}
  .staged .part{border-left:2px solid var(--signal);padding:7px 11px;margin-bottom:8px;font-size:13px;background:var(--panel);border-radius:0 6px 6px 0;opacity:0;transform:translateY(6px);transition:.3s}
  .staged .part.in{opacity:1;transform:none}.staged .part .pm{font-family:var(--mono);font-size:9px;color:var(--signal);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px}
  /* models / fabric */
  .mrow{display:grid;grid-template-columns:1.4fr 1fr 70px 86px 70px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line-faint);font-size:12.5px}
  .mrow .mn{font-weight:600}.mrow .mid{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .mvram{height:7px;background:var(--panel);border-radius:4px;overflow:hidden}.mvram i{display:block;height:100%;background:var(--t-local)}
  .pillstate{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:20px;text-align:center}
  .resident{background:rgba(95,192,154,.13);color:var(--whole)}.evicted{background:rgba(150,160,178,.1);color:var(--ink-faint)}.down{background:rgba(221,106,94,.13);color:var(--fray)}.cloud{background:rgba(207,159,99,.14);color:var(--t-cloud)}
  .sess{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);margin-bottom:9px}
  .sess .sdot{width:8px;height:8px;border-radius:50%;flex:none}.sess .snm{font-weight:600;font-size:13px}.sess .scwd{font-family:var(--mono);font-size:10px;color:var(--ink-faint)}.sess .sright{margin-left:auto;text-align:right;font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  /* RHM dock */
  .dock{position:fixed;right:0;top:0;bottom:0;width:330px;background:rgba(11,15,23,.98);border-left:1px solid var(--line-bright);transform:translateX(100%);transition:transform .24s;z-index:40;display:flex;flex-direction:column;backdrop-filter:blur(10px)}
  .dock.open{transform:none}

function renderRecallOps(){$("#recallops").innerHTML=RECALL_OPS.map(([op,d])=>`<button class="${state.recallOp===op?'on':''}" data-op="${op}" title="${d}">${op}</button>`).join("");
 $$("#recallops button").forEach(b=>b.onclick=()=>{state.recallOp=b.dataset.op;renderRecallOps();if($("#recall").value.trim().length>=2)doRecall();});}
const ri=()=>$("#recall"),rr=()=>$("#recallres");
function doRecall(){const res=RECALL_RES[state.recallOp]||RECALL_RES.find;rr().classList.add("open");
 rr().innerHTML=res.map(r=>`<div class="rr" data-node="${r.node}"><span class="sc ${r.text?'text':''}">${r.sc}</span>${r.tim}</div>`).join("");
 $$(".rr",rr()).forEach(el=>el.onclick=()=>{go("map");rr().classList.remove("open");ri().value="";
  setTimeout(()=>{const n=M.nodes&&M.nodes.find(x=>x.id===el.dataset.node);if(n){state.lens="principle";retarget();openDrill(NODES_BY[el.dataset.node]);const cw=$(".canvas-wrap");if(cw){cw.classList.add("flash");setTimeout(()=>cw.classList.remove("flash"),1400);}}},90);});}
$("#recall").addEventListener("input",function(){if(this.value.trim().length<2){rr().classList.remove("open");return;}doRecall();});
$("#recall").addEventListener("keydown",e=>{if(e.key==="Enter"&&$(".rr"))$(".rr").click();});
$("#scope").onclick=function(){const o=["everything","self","this project","the board"];const i=(o.indexOf(state.scope)+1)%o.length;state.scope=o[i];this.textContent="scope · "+state.scope;};

/* ── helpers ── */
function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function fitCanvas(cv){const w=cv.parentElement.clientWidth||cv.clientWidth;let h=cv.height;if(innerWidth<760)h=Math.min(h,340);cv.width=w*devicePixelRatio;cv.height=h*devicePixelRatio;cv.style.width="100%";cv.style.height=h+"px";}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function renderVram(){const segs=[["--t-local",9.1],["--t-embed",4.2]];const used=13.3;
 $("#vram").innerHTML=`<span>VRAM</span><span class="bar">${segs.map(([c,v])=>`<i class="seg" style="width:${v/16*100}%;background:var(${c})"></i>`).join("")}</span><span style="font-variant-numeric:tabular-nums">${used}/16G</span>`;}
function syncGlobal(){const o=state.openFindings;$("#gtext").textContent=o===0?"whole":`${o} open`;
 $("#gdot").style.background=o===0?"var(--whole)":"var(--gold)";$("#gdot").style.boxShadow=`0 0 8px ${o===0?'var(--whole)':'var(--gold)'}`;}

/* the address trace: one address, seen across every surface that touches it (one brain) */
const ADDR_TRACE={
 "/api/run-stats":[["pulse","a frayed seam","fray"],["bench","awaiting your eye","gold"],["map","wired ∧ meaningless","map"]],
 "unit://render-not-judge":[["memory","a ratified principle","whole"],["map","gold ·92, the wizard core","map"],["cast","model_of_tim reasons from it","violet"]],
 "exchange://12c59b4e/114":[["memory","the embedding-model decision","signal"],["map","recoverable across drift","map"],["bench","—","gold"]],
 "recollection://recall":[["memory","the outer memory layer","signal"],["fabric","recollection-design session","gold"],["models","embeds via :8007","whole"]],
 "orienteering://INDEX":[["pulse","38/38 paths whole","whole"],["map","the terrain ledger","map"],["loom","the drift chain surfaces here","signal"]]};
const TRACE_ICO={pulse:I.pulse,bench:I.bench,map:I.map,cast:I.cast,memory:I.memory,fabric:I.fabric,models:I.models,loom:I.loom,theatre:I.theatre};
function achip(addr,label){return `<span class="achip" data-trace="${addr}">${label||addr}</span>`;}
function wireChips(root=document){$$(".achip",root).forEach(c=>c.onclick=e=>{e.stopPropagation();openTrace(c.dataset.trace,c);});}
function openTrace(addr,anchor){const t=$("#trace");const rows=ADDR_TRACE[addr]||[["map","seen on the map","map"]];
 t.innerHTML=`<div class="th">⌖ ${addr}<span style="margin-left:auto;color:var(--ink-faint);cursor:pointer" onclick="$('#trace').classList.remove('open')">✕</span></div>`
  +rows.map(([room,desc,col])=>`<div class="tr" data-go="${room}"><span class="ti" style="color:var(--${col==='map'?'signal':col})">${TRACE_ICO[room]}</span><span>${desc}</span><span class="tg">${ROOMS.find(r=>r.id===room).nm.replace('The ','')}</span></div>`).join("");
 const r=anchor.getBoundingClientRect();t.style.left=Math.min(r.left,innerWidth-316)+"px";t.style.top=Math.min(r.bottom+6,innerHeight-220)+"px";
 if(innerWidth<760){t.style.left="12px";t.style.right="12px";t.style.width="auto";}
 t.classList.add("open");
 $$(".tr",t).forEach(el=>el.onclick=()=>{t.classList.remove("open");go(el.dataset.go);toast(reg("followed the thread to ","traced → ")+ROOMS.find(x=>x.id===el.dataset.go).nm);});}
document.addEventListener("click",e=>{const t=$("#trace");if(t.classList.contains("open")&&!t.contains(e.target)&&!e.target.classList.contains("achip"))t.classList.remove("open");});

/* the live ticker — the fabric breathing */
const TICKS=[["dragnet-build","extract-once pass done · 52k chunks","12m"],["company-build","operable lane green · 2 needs-tim","8m"],["recollection-design","units recorded, not embedded yet","1h"],["coherence","ledger re-scanned · 0 new frays","3m"],["mockup-build","12 views rendered · 4 quality-passed","20m"],["you (lead)","built the drift detector · verified","now"]];
let tickI=0,tickTimer=null;
function startTicker(el){if(!el)return;function step(){const[src,msg,age]=TICKS[tickI%TICKS.length];el.innerHTML=`<span class="lv"></span><span class="tk"><span class="src">${src}</span> · ${msg}</span><span class="age">${age}</span>`;tickI++;}step();clearInterval(tickTimer);if(!reduce)tickTimer=setInterval(step,3800);}

/* toast + undo */
let toastTimer=null;
function toast(msg,undo){const t=$("#toast");t.innerHTML=`<span class="ti2"></span><span>${msg}</span>${undo?`<span class="un" id="undobtn">undo</span>`:""}`;t.classList.add("show");
 clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),undo?5000:2600);
 if(undo){$("#undobtn").onclick=()=>{undo();t.classList.remove("show");};}}
