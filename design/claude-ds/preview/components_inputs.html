<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Inputs & checkboxes" subtitle="Text · search · checkbox · textarea + inline-preview helper" viewport="700x280" --><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 26px; min-height: 240px; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 12px/1.2 var(--font-body); color: var(--fg-primary); }
  .help { font: 400 11px/1.4 var(--font-mono); color: var(--fg-secondary); }
  .help b { color: var(--accent-gold); font-weight: 600; }
  .input {
    font: 400 14px/1 var(--font-body); color: var(--fg-primary);
    background: var(--bg-surface);
    border: 1px solid var(--border-default); border-radius: var(--r-md);
    padding: 10px 12px; outline: none;
  }
  .input.focus { border-color: var(--accent-gold); box-shadow: 0 0 0 3px var(--accent-gold-soft); }
  .input.search {
    background: var(--bg-surface);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 14' fill='none' stroke='%23A89678' stroke-width='1.5' stroke-linecap='round'><circle cx='6' cy='6' r='4'/><path d='M9 9 L12 12'/></svg>");
    background-repeat: no-repeat; background-position: 10px center; background-size: 14px;
    padding-left: 32px;
  }
  .check { display: flex; align-items: center; gap: 8px; font: 500 13px/1 var(--font-body); color: var(--fg-primary); }
  .check .box {
    width: 16px; height: 16px; border-radius: 4px; flex: none;
    background: var(--accent-gold); position: relative;
  }
  .check .box::after {
    content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px;
    border-right: 2px solid var(--fg-primary); border-bottom: 2px solid var(--fg-primary);
    transform: rotate(45deg);
  }
  .check.off .box { background: var(--accent-gold-soft); }
  .check.off .box::after { display: none; }
  .group { display: flex; flex-direction: column; gap: 10px; }
</style></head>
<body><div class="card">
  <div class="field">
    <span class="label">Hub Name</span>
    <input class="input focus" value="Tower East — Stage 1">
    <span class="help">URL preview: <b>https://conceptv.io/panotours/acme/tower-east</b></span>
  </div>
  <div class="field">
    <span class="label">Search</span>
    <input class="input search" placeholder="Search">
    <span class="help" style="color:var(--fg-muted)">Default state · 1 px border, focus turns gold</span>
  </div>
  <div class="field">
    <span class="label">Menu Options</span>
    <div class="group">
      <span class="check"><span class="box"></span>Information Panel</span>
      <span class="check"><span class="box"></span>Share Panel</span>
      <span class="check off"><span class="box"></span>VR Mode</span>
    </div>
  </div>
  <div class="field">
    <span class="label">Meta Description</span>
    <textarea class="input" style="resize:none;height:64px;font:400 12px/1.5 var(--font-body);color:var(--fg-muted)">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod.</textarea>
    <span class="help" style="color:var(--fg-muted)">Multi-line input, same border treatment as single-line</span>
  </div>
</div></body></html>
