<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Screen-title treatment" subtitle="Display 700 in bronze — the dashboard H1 pattern" viewport="700x220" --><html><head><meta charset="utf-8"><title>Screen title treatment</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 30px; min-height: 220px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
  .stage { background: var(--bg-canvas); border-radius: var(--r-lg); padding: 24px 28px; display: flex; gap: 36px; align-items: flex-start; }
  .title { font: 700 38px/1.1 var(--font-display); letter-spacing: -0.02em; color: var(--accent-bronze); margin: 0; }
  .sub { font: 400 13px/1.5 var(--font-body); color: var(--fg-secondary); margin: 6px 0 0; max-width: 360px; }
  .lead { font: 400 12px/1.5 var(--font-body); color: var(--fg-secondary); margin: 0; }
</style></head>
<body><div class="card">
  <p class="lead">Screen titles are set in <b>display 700</b> at <b>~36 px</b> in <b>bronze</b> (#988058) — not gold. Used as the H1 on every dashboard surface.</p>
  <div class="stage">
    <div>
      <h1 class="title">Brand Kit</h1>
      <p class="sub">Set the visual identity that every project under this account will inherit.</p>
    </div>
    <div>
      <h1 class="title">Virtual Hub Settings</h1>
      <p class="sub">Configure menu options, navigation, and linked hub variants.</p>
    </div>
  </div>
</div></body></html>
