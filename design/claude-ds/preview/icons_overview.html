<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Icon library — overview" subtitle="99 SVG icons, single source of truth" viewport="700x320" --><html><head><meta charset="utf-8"><title>Icon library overview</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; min-height: 320px; display: flex; flex-direction: column; gap: 12px; }
  .lead { font: 400 12px/1.5 var(--font-body); color: var(--fg-secondary); margin: 0; max-width: 95%; }
  .lead b { color: var(--fg-primary); }
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; flex: 1; align-content: center; }
  .gly { display: flex; align-items: center; justify-content: center; aspect-ratio: 1; }
  .meta { display: flex; gap: 18px; font: 400 11px/1 var(--font-body); color: var(--fg-secondary); margin-top: 4px; }
  .meta b { color: var(--fg-primary); font-weight: 600; }
  .meta a { color: var(--accent-gold); text-decoration: none; font-weight: 600; }
</style></head>
<body><div class="card">
  <p class="lead"><b>99 individual icons</b> in <code style="font-family:var(--font-mono);font-size:11px;color:var(--accent-gold)">assets/icons/svg/</code> — single-stroke, 1.5&nbsp;px, 24&nbsp;×&nbsp;24 grid. Render in React with <code style="font-family:var(--font-mono);font-size:11px">&lt;CvIcon name="…"/&gt;</code> or open <a href="../assets/icons/index.html" target="_blank">the explorer →</a></p>
  <div class="grid" id="g"></div>
  <div class="meta">
    <span>People <b>·</b> Files <b>·</b> Comms <b>·</b> Architecture <b>·</b> Browser <b>·</b> Actions <b>·</b> System <b>·</b> Logic <b>·</b> Platform</span>
  </div>
</div>
<script src="../assets/icons/cv-icons.js"></script>
<script>
const SHOW = ['person','people','team','handshake','file','files-stack','brochure','clipboard',
  'chat','megaphone','bell','share','house','building-tall','crane','floorplan','vr-headset','drone',
  'browser','dashboard','image','calendar','gear','cloud-upload','database','dollar-circle',
  'network','decision-tree','hierarchy','globe','play','lock','star','tag','workstation','color-swatches'];
const g = document.getElementById('g');
SHOW.forEach(n => {
  const body = window.CV_ICONS.data[n];
  if (!body) return;
  g.innerHTML += `<div class="gly"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--accent-bronze)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${body}</svg></div>`;
});
</script>
</body></html>
