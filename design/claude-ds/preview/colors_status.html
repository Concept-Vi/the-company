<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Status colors" subtitle="Warm-shifted success / warning / error / info / pending" viewport="700x220" --><html><head><meta charset="utf-8"><title>Status colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; min-height: 200px; }
  .lead { font: 400 12px/1.5 var(--font-body); color: var(--fg-secondary); margin: 0 0 14px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--r-md); display: flex; align-items: center; padding: 0 12px; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .pill { font: 600 11px/1 var(--font-body); padding: 4px 8px; border-radius: var(--r-pill); }
  .name { font: 600 11px/1 var(--font-body); color: var(--fg-primary); }
  .hex { font: 400 11px/1 var(--font-mono); color: var(--fg-muted); }
</style></head>
<body><div class="card">
  <p class="lead">Status — warm-shifted, desaturated to sit inside the ivory palette. Pending uses gold, not amber.</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E6EFDB"><span class="dot" style="background:#5A8A4A"></span><span class="pill" style="color:#3D6431">Approved</span></div><span class="name">success</span><span class="hex">#5A8A4A</span></div>
    <div class="sw"><div class="chip" style="background:#FBEBC8"><span class="dot" style="background:#E5A547"></span><span class="pill" style="color:#8A6020">Review</span></div><span class="name">warning</span><span class="hex">#E5A547</span></div>
    <div class="sw"><div class="chip" style="background:#F5D7D2"><span class="dot" style="background:#C24A3C"></span><span class="pill" style="color:#7A2D24">Rejected</span></div><span class="name">error</span><span class="hex">#C24A3C</span></div>
    <div class="sw"><div class="chip" style="background:#DCE7F3"><span class="dot" style="background:#4A78B8"></span><span class="pill" style="color:#2A4A78">Info</span></div><span class="name">info</span><span class="hex">#4A78B8</span></div>
    <div class="sw"><div class="chip" style="background:#FBF1C0"><span class="dot" style="background:#E5C547"></span><span class="pill" style="color:#7A6520">Pending</span></div><span class="name">pending</span><span class="hex">#E5C547</span></div>
  </div>
</div></body></html>
