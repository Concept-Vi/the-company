<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Mono — JetBrains Mono" subtitle="URLs, IDs, code blocks" viewport="700x220" --><html><head><meta charset="utf-8"><title>Mono</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 30px; min-height: 200px; display: flex; flex-direction: column; gap: 16px; }
  .specimen { font: 500 22px/1.4 var(--font-mono); color: var(--fg-primary); margin: 0; }
  .specimen .a { color: var(--accent-gold); }
  .specimen .m { color: var(--fg-muted); }
  .block {
    font: 400 13px/1.5 var(--font-mono);
    background: var(--bg-dark);
    color: var(--fg-inverse);
    padding: 12px 16px;
    border-radius: var(--r-md);
  }
  .block .k { color: var(--accent-gold-dashed); }
  .meta { display: flex; gap: 24px; font: 400 12px/1 var(--font-body); color: var(--fg-secondary); margin: 0; }
  .meta b { color: var(--fg-primary); font-weight: 600; }
</style></head>
<body><div class="card">
  <p class="specimen">https://conceptv.io/panotours/<span class="a">acme-arch</span>/<span class="m">tower-east</span></p>
  <div class="block"><span class="k">$</span> conceptv publish --hub tower-east --stage entry</div>
  <p class="meta"><span><b>JetBrains Mono</b></span><span>400 · 500</span><span>URLs, IDs, code samples</span></p>
</div></body></html>
