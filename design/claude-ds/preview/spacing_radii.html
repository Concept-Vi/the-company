<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Radii" subtitle="Six tiers · 4 → pill" viewport="700x220" --><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; min-height: 200px; }
  .lead { font: 400 12px/1.5 var(--font-body); color: var(--fg-secondary); margin: 0 0 18px; }
  .row { display: flex; align-items: flex-end; gap: 20px; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .chip { width: 84px; height: 64px; background: var(--accent-gold-soft); border: 1.5px solid var(--accent-gold); }
  .pill { width: 110px; height: 36px; background: var(--accent-gold); border-radius: 999px; }
  .name { font: 600 11px/1 var(--font-body); color: var(--fg-primary); }
  .px { font: 400 11px/1 var(--font-mono); color: var(--fg-muted); }
</style></head>
<body><div class="card">
  <p class="lead">Six tiers. Chips & checkboxes <b>4–6 px</b>; buttons/inputs <b>8</b>; cards <b>12</b>; popups <b>16</b>; only status dots & the Chats button go full pill.</p>
  <div class="row">
    <div class="sw"><div class="chip" style="border-radius:4px"></div><span class="name">xs</span><span class="px">4 px</span></div>
    <div class="sw"><div class="chip" style="border-radius:6px"></div><span class="name">sm</span><span class="px">6 px</span></div>
    <div class="sw"><div class="chip" style="border-radius:8px"></div><span class="name">md ★</span><span class="px">8 px</span></div>
    <div class="sw"><div class="chip" style="border-radius:12px"></div><span class="name">lg</span><span class="px">12 px</span></div>
    <div class="sw"><div class="chip" style="border-radius:16px"></div><span class="name">xl</span><span class="px">16 px</span></div>
    <div class="sw"><div class="pill"></div><span class="name">pill</span><span class="px">999</span></div>
  </div>
</div></body></html>
