<!DOCTYPE html>
<html lang="en" data-theme="dark" data-surface="mobile-portrait">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Glass · Mobile settings</title>
<link rel="stylesheet" href="../../styles.css"/>
<link rel="stylesheet" href="glass-app.css"/>
<style>
  body{ display: grid; place-items: center; min-height: 100vh; }

  /* profile card */
  .profile{ display: flex; align-items: center; gap: var(--s-3); padding: var(--s-4); min-width: 0; cursor: pointer; }
  .profile .who{ flex: 1; min-width: 0; }
  .profile .nm{ font-size: var(--fs-body); font-weight: 600; color: var(--ink); }
  .profile .em{ font-size: var(--fs-caption); color: var(--ink-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* a settings group = inset well; rows inside share one rhythm */
  .group{ padding: 0 var(--s-3); }
  .r{ display: flex; align-items: center; gap: var(--s-3); min-height: var(--touch-min); padding: var(--s-2) 0; min-width: 0; }
  .r + .r{ border-top: 1px solid var(--glass-edge-soft); }
  .r .ic{ width: 30px; height: 30px; border-radius: var(--r-sm); display: grid; place-items: center; flex: none;
    background: color-mix(in oklch,var(--ink) 8%,transparent); color: var(--ink-2); }
  .r .t{ flex: 1; min-width: 0; font-size: var(--fs-caption); color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .r .chev{ color: var(--ink-4); flex: none; }

  /* theme control stacks onto its own line so it can never spill the row */
  .r.stack{ flex-direction: column; align-items: stretch; gap: var(--s-2); padding-block: var(--s-3); }
  .r.stack .rl{ display: flex; align-items: center; gap: var(--s-3); min-width: 0; }
  .seg2{ display: flex; gap: 3px; padding: 3px; border-radius: var(--r-md); }
  .seg2 button{ flex: 1; min-width: 0; text-align: center; font-size: 11px; font-weight: 600; padding: 6px 4px; border-radius: var(--r-xs);
    color: var(--ink-3); border: 0; background: transparent; font-family: inherit; white-space: nowrap; cursor: pointer; }
  .seg2 button.on{ color: var(--ink); background: color-mix(in oklch,var(--ink) 12%,transparent); box-shadow: inset 0 1px 0 var(--glass-highlight); }
</style>
</head>
<body>
<div class="gg-field"><span class="a"></span><span class="b"></span><span class="c"></span></div>

<div class="cv-device">
  <div class="cv-device__notch"></div>
  <div class="cv-device__screen">

    <div class="cv-statusbar"><span>9:41</span><span class="cv-statusbar__radios">
      <svg width="16" height="11" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1" width="3" height="11" rx="1"/><rect x="15" y="4" width="3" height="8" rx="1" opacity=".4"/></svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 5.5a11 11 0 0 1 16 0M5 9a6.5 6.5 0 0 1 10 0"/><circle cx="10" cy="12" r="1.1" fill="currentColor" stroke="none"/></svg>
      <svg width="24" height="12" viewBox="0 0 26 13" fill="none"><rect x="1" y="1.5" width="21" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".5"/><rect x="3" y="3.5" width="15" height="6" rx="1" fill="currentColor"/><rect x="23" y="4.5" width="2" height="4" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
    </span></div>

    <div class="cv-appbar">
      <div class="cv-appbar__title">Settings</div>
      <div class="gg-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    </div>

    <div class="cv-screen-scroll">
      <div class="m-col">

        <div class="profile glass--inset">
          <div class="gg-avatar gold" style="width:48px;height:48px;font-size:var(--fs-body)">JL</div>
          <div class="who"><div class="nm">Jordan Lee</div><div class="em">jordan@atlas.co</div></div>
          <span class="cv-badge cv-badge--gold" style="font-size:10px">Pro</span>
          <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="var(--ink-4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <div>
          <div class="m-cap">Appearance</div>
          <div class="group glass--inset">
            <div class="r stack">
              <div class="rl"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M6 6l1.5 1.5M16.5 16.5L18 18M18 6l-1.5 1.5M7.5 16.5L6 18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></div><div class="t">Theme</div></div>
              <div class="seg2 glass--inset"><button>Light</button><button>Dim</button><button class="on">Dark</button><button>Contrast</button></div>
            </div>
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12h16M4 6h16M4 18h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></div><div class="t">Reduce motion</div><button class="gg-switch" aria-label="Reduce motion"></button></div>
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.7"/><path d="M9 9h6v6H9z" stroke="currentColor" stroke-width="1.7"/></svg></div><div class="t">Compact density</div><button class="gg-switch on" aria-label="Compact density"></button></div>
          </div>
        </div>

        <div>
          <div class="m-cap">Notifications</div>
          <div class="group glass--inset">
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 19a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.7"/></svg></div><div class="t">Push notifications</div><button class="gg-switch on"></button></div>
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.6"/><path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.6"/></svg></div><div class="t">Email digest</div><button class="gg-switch"></button></div>
          </div>
        </div>

        <div>
          <div class="m-cap">Account</div>
          <div class="group glass--inset">
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.7"/></svg></div><div class="t">Privacy &amp; security</div><svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M3 10h18" stroke="currentColor" stroke-width="1.7"/></svg></div><div class="t">Billing</div><svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="r"><div class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M9.5 9a2.5 2.5 0 1 1 3.2 2.4c-.7.3-.7.8-.7 1.6M12 17h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></div><div class="t">Help &amp; support</div><svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          </div>
        </div>

      </div>
    </div>

    <nav class="cv-tabbar">
      <button class="cv-tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/></svg>Home</button>
      <button class="cv-tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 19V5m0 14h16M8 15v-4m4 4V8m4 7v-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Stats</button>
      <button class="cv-tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.7"/><path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.7"/></svg>Inbox</button>
      <button class="cv-tab is-active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M5 20a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.8"/></svg>You</button>
    </nav>

  </div>
  <div class="cv-device__home"></div>
</div>
</body>
</html>
