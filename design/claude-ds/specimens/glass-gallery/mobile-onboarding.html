<!DOCTYPE html>
<html lang="en" data-theme="dark" data-surface="mobile-portrait">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Glass · Mobile onboarding</title>
<link rel="stylesheet" href="../../styles.css"/>
<link rel="stylesheet" href="glass-app.css"/>
<style>
  body{ display: grid; place-items: center; min-height: 100vh; }
  .o-col{ padding: var(--s-2) var(--s-5) 0; display: flex; flex-direction: column; height: 100%; }
  .hero{ aspect-ratio: 4/3; border-radius: var(--r-2xl); margin-top: var(--s-2); }
  .o-title{ font-size: var(--fs-h2); font-weight: 700; color: var(--ink); letter-spacing: var(--tracking-tight); line-height: 1.15; margin-top: var(--s-5); }
  .o-sub{ font-size: var(--fs-body); color: var(--ink-3); line-height: 1.55; margin-top: var(--s-3); }
  .steps{ display: flex; flex-direction: column; gap: var(--s-3); margin-top: var(--s-5); }
  .step{ display: flex; align-items: center; gap: var(--s-3); padding: var(--s-3); }
  .step .n{ width: 30px; height: 30px; border-radius: var(--r-pill); display: grid; place-items: center; flex: none;
    background: var(--accent-gold); color: var(--on-gold); font-weight: 700; font-size: var(--fs-caption); }
  .step .n.off{ background: color-mix(in oklch,var(--ink) 10%,transparent); color: var(--ink-3); }
  .step .t{ font-size: var(--fs-caption); color: var(--ink); font-weight: 500; }
  .step .d{ font-size: 11px; color: var(--ink-4); margin-top: 1px; }
  .dots{ display: flex; gap: 7px; justify-content: center; margin-top: var(--s-5); }
  .dots i{ width: 7px; height: 7px; border-radius: 50%; background: color-mix(in oklch,var(--ink) 20%,transparent); }
  .dots i.on{ width: 22px; border-radius: var(--r-pill); background: var(--accent-gold); }
  .o-foot{ flex: none; padding: var(--s-4) var(--s-5) var(--s-5); display: flex; align-items: center; gap: var(--s-3); }
</style>
</head>
<body>
<div class="gg-field"><span class="a"></span><span class="b"></span><span class="c"></span></div>

<div class="cv-device">
  <div class="cv-device__notch"></div>
  <div class="cv-device__screen">

    <div class="cv-statusbar"><span>9:41</span><span class="cv-statusbar__radios">
      <svg width="16" height="11" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1" width="3" height="11" rx="1"/><rect x="15" y="4" width="3" height="8" rx="1" opacity=".4"/></svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 5.5a11 11 0 0 1 16 0M5 9a6.5 6.5 0 0 1 10 0"/><circle cx="10" cy="12" r="1.1" fill="currentColor" stroke="none"/></svg>
      <svg width="24" height="12" viewBox="0 0 26 13" fill="none"><rect x="1" y="1.5" width="21" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".5"/><rect x="3" y="3.5" width="15" height="6" rx="1" fill="currentColor"/><rect x="23" y="4.5" width="2" height="4" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
    </span></div>

    <div class="cv-appbar">
      <div class="gg-brand" style="width:30px;height:30px;border-radius:var(--r-sm)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 5l8 14 8-14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div style="flex:1"></div>
      <button class="cv-btn cv-btn--ghost cv-btn--sm">Skip</button>
    </div>

    <div class="cv-screen-scroll">
      <div class="o-col">
        <div class="gg-slot hero"><div class="ring" style="width:64px;height:64px"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 5l8 14 8-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>

        <div class="o-title">Design that follows rules, not moods.</div>
        <div class="o-sub">Every surface floats on the same glass material — one set of tokens, referenced everywhere. Set it up once.</div>

        <div class="steps">
          <div class="step glass--inset"><div class="n">1</div><div style="flex:1;min-width:0"><div class="t">Pick your theme</div><div class="d">Light, dim, dark or high-contrast</div></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="var(--accent-gold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="step glass--inset"><div class="n off">2</div><div style="flex:1;min-width:0"><div class="t">Connect your data</div><div class="d">Sources sync automatically</div></div></div>
          <div class="step glass--inset"><div class="n off">3</div><div style="flex:1;min-width:0"><div class="t">Invite your team</div><div class="d">Roles and permissions</div></div></div>
        </div>

        <div style="flex:1"></div>
        <div class="dots"><i class="on"></i><i></i><i></i></div>
      </div>
    </div>

    <div class="o-foot">
      <div class="gg-round"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <button class="cv-btn cv-btn--primary" style="flex:1">Continue</button>
    </div>

  </div>
  <div class="cv-device__home"></div>
</div>
</body>
</html>
