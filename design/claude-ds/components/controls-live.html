<!DOCTYPE html>

<script src="../_ds_bundle.js"></script>
<style>

<body>
  <h1>Controls — live</h1>
  <p class="sub">The actual <code>Select</code>, <code>Tooltip</code> and <code>Popover</code> components, mounted from <code>_ds_bundle.js</code> via <code>window.ConceptVDesignSystem_c8f43c</code> — not static markup. Positioning is single-sourced through <code>window.CV_POPOVER</code> (flips when out of room, shifts to stay on screen).</p>
  <div id="app"></div>

<script>
(function () {
  var NS = window.ConceptVDesignSystem_c8f43c || {};
  var Select = NS.Select, Tooltip = NS.Tooltip, Popover = NS.Popover;
  var e = React.createElement;
  var mount = document.getElementById("app");
  if (!Select || !Tooltip) {

  }
  function Demo() {
    var unit = React.useState("three"); var v = unit[0], setV = unit[1];
    var pop = React.useState(false); var open = pop[0], setOpen = pop[1];
    var anchor = React.useRef(null);
    return e("div", null,
      e("h2", null, "Select"),
      e("div", { className: "row" },
        e("div", { className: "stack", style: { width: 260 } },
          e("p", { className: "cap" }, "PROPERTY TYPE"),

              { value: "three", label: "Three-bed apartment" },

            e("button", { className: "cv-btn cv-btn--outline" }, "Net area")),
        ),
        e("div", { className: "stack" },
          e("p", { className: "cap" }, "PLACEMENT FLIPS NEAR EDGES"),
          e(Tooltip, { label: "Stays in view — flips below when there's no room above", placement: "top" },
            e("button", { className: "cv-btn cv-btn--soft" }, "Hover me")))),
      e("h2", null, "Popover (anchored)"),
      e("div", { className: "row" },
        e("div", { className: "stack" },
          e("p", { className: "cap" }, "CLICK TO ANCHOR A SURFACE"),
          e("button", { ref: anchor, className: "cv-btn cv-btn--primary", onClick: function () { setOpen(!open); } }, open ? "Close" : "Open popover"),

  }

</script>

</html>
