<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../core/archetype-catalog.js"></script>
<style>body{margin:0;padding:24px;background:var(--zone-ground);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:1fr;gap:18px;max-width:1100px;margin:0 auto}
.cap{font:700 10px/1 var(--font-mono);color:var(--accent-bronze);margin-bottom:6px;display:block}
.frame{position:relative;border:1px solid var(--zone-base-edge);border-radius:10px;overflow:hidden;box-shadow:var(--elev-2);background:var(--zone-ground)}
.artboard{width:1100px;transform-origin:top left}
pre#diag{font:11px/1.5 var(--font-mono);color:var(--ink-2);background:color-mix(in oklch,var(--pig-content) 4%,var(--zone-ground));padding:12px;border-radius:8px;max-width:1100px;margin:0 auto 18px}</style>
</head>
<body>
<pre id="diag"></pre>
<div class="grid" id="slides"></div>
<script>
async function boot() {
  async function load(path) {
    const txt = await (await fetch(path)).text();
    const stripped = txt
      .replace(/^export default .*;?$/gm, "")
      .replace(/^export \{[^}]*\};?$/gm, "")
      .replace(/^export /gm, "");
    return Babel.transform(stripped, { presets: ["react"] }).code;
  }
  function build(code, name) { return new Function("React", "window", code + "\nreturn " + name + ";")(React, window); }
  build(await load("../core/DiagramSolver.jsx"), "DiagramSolver");
  build(await load("../core/ContainmentTree.jsx"), "ContainmentTree");
  build(await load("../core/Slide.jsx"), "Slide");
  const RenderType = build(await load("../core/RenderType.jsx"), "RenderType");
  const CoreTypes = build(await load("../core/RenderType.jsx"), "CoreTypes");
  const e = React.createElement;

  // diagnostics — the weld proof
  const seeds = CoreTypes.seeds();
  const diag = document.getElementById("diag");
  diag.textContent =
    "catalogue single-source  : window.CV_ARCHETYPE_CATALOG present = " + !!window.CV_ARCHETYPE_CATALOG + "\n" +
    "CoreTypes.seeds() count   : " + seeds.length + "  (expect 15)\n" +
    "first seed                : " + JSON.stringify(seeds[0]) + "\n" +
    "RenderType resolves typeId: surface.deck-slide.metric-band -> " + (CoreTypes.get("surface.deck-slide.metric-band") ? "found" : "MISSING");

  // 1) render BY TYPE ID (resolved via CoreTypes) — the bridge path
  const metricData = { title: "Welded: rendered by Type id", metrics: [
    { value: "15", label: "archetypes, one catalogue" }, { value: "1", label: "engine" }, { value: "0", label: "parallel lists" }], note: "RenderType(typeId) → typeToNode → solvers." };

  // 2) render a DOC Type — a sequence (the deck case)
  const docType = { id: "doc.deck", layer: "doc", family: "deck", defaults: { slides: [
    { archetype: "cover", content: { title: "Doc Type → sequence", kicker: "ConceptV", subtitle: "One doc Type expands its slides slot through the same engine." } },
    { archetype: "compare", content: { title: "Current vs Virtual Hubs",
      left: { title: "Current", bullets: ["Files emailed", "Versions drift"] },
      right: { title: "Virtual Hubs", bullets: [{ text: "Single source", bullet: "done" }] }, note: "Same engine." } },
  ] } };

  const cases = [
    ["RenderType · typeId=surface.deck-slide.metric-band", () => e(RenderType, { typeId: "surface.deck-slide.metric-band", data: metricData, lod: "full", surface: "slide", density: "compact" })],
    ["RenderType · doc.deck (sequence via slots)", () => e(RenderType, { type: docType, lod: "full", surface: "slide", density: "compact" })],
  ];
  const root = document.getElementById("slides");
  cases.forEach(([cap, render]) => {
    const col = document.createElement("div"); col.innerHTML = '<span class="cap">'+cap+'</span>';
    const f = document.createElement("div"); f.className = "frame";
    const art = document.createElement("div"); art.className = "artboard"; f.appendChild(art);
    col.appendChild(f); root.appendChild(col);
    ReactDOM.createRoot(art).render(render());
    const fit = () => { const s = f.clientWidth/1100; art.style.transform = "scale("+s+")"; f.style.height = (art.offsetHeight*s)+"px"; };
    requestAnimationFrame(fit); new ResizeObserver(fit).observe(f); setTimeout(fit, 400);
  });
  window.__ready = true;
}
boot().catch(err => { document.body.innerHTML = '<pre style="color:red">'+err.stack+'</pre>'; });
</script>
</body>
</html>
