<style>
  /* page-face MARKER — embedded on a real thing that has a page-face; opens the live page (:8774). */
  .dsa-face-marker{
    position:absolute; top:10px; right:10px; z-index:2;
    display:inline-flex; align-items:center; gap:5px;
    font:600 10px/1 var(--font-body); letter-spacing:.04em;
    color:var(--accent-gold-deep,#9F772C);
    background:var(--accent-gold-50,#FBF4C8);
    border:1px solid var(--accent-gold-dashed,#D8C040);
    border-radius:999px; padding:4px 9px; cursor:pointer;
    box-shadow:var(--shadow-sm); transition:all 140ms var(--ease-out);
  }
  .dsa-face-marker:hover{ background:var(--accent-gold-soft,#F4E89A); border-color:var(--accent-gold,#E0C010); }
  /* preview style — an inline strip on the real tile (the other tweak option) */
  .dsa-face-strip{ margin-top:10px; border-top:1px dashed var(--accent-gold-soft,#F4E89A); padding-top:9px;
    display:flex; flex-direction:column; gap:5px; cursor:pointer; }
  .dsa-face-strip .ex{ font:400 11px/1.45 var(--font-body); color:var(--fg-secondary,#6B5F47);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .dsa-face-strip .open{ font:600 11px/1 var(--font-body); color:var(--accent-gold-deep,#9F772C); align-self:flex-start; }
  .dsa-face-strip:hover .open{ color:var(--accent-gold,#E0C010); }
  /* relational style — ONLY positioning. The glyph itself (shapes, textured line, arrow) is GENERATED
     by CV_GLYPHIC.composeRelation as inline SVG; no hand-drawn shape here (the self-test: this block
     carries no geometry, yet the relational marker still renders, because it's a real glyphic). */
  .dsa-face-glyph{ position:absolute; top:8px; right:8px; cursor:pointer; line-height:0; }
  /* inline style — a small face panel sitting in the tile */
  .dsa-face-inline-tile{ margin-top:10px; border-top:1px dashed var(--accent-gold-soft,#F4E89A); padding-top:9px;
    display:flex; flex-direction:column; gap:2px; cursor:pointer; }
  .dsa-face-inline-tile .cap{ font:600 9px/1 var(--font-body); letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted,#A89678); }
  .dsa-face-inline-tile .ttl{ font:700 12px/1.25 var(--font-display); color:var(--ink,#1F1A12); }
  .dsa-face-inline-tile .open{ font:600 11px/1 var(--font-body); color:var(--accent-gold-deep,#9F772C); align-self:flex-start; margin-top:2px; }
  .dsa-face-inline-tile:hover .open{ color:var(--accent-gold,#E0C010); }

  /* ---- the 4 face treatments (the switcher) ---- */
  .dsa-face-empty{ color:var(--fg-muted); font:400 13px/1.5 var(--font-body); }
  .dsa-face-tile .open,.dsa-face-row .open,.dsa-face-inline .open,.dsa-face-marker{ white-space:nowrap; }

  /* A · preview tiles */
  .dsa-face-tiles{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .dsa-face-tile{ background:var(--bg-surface); border:1px solid transparent; border-radius:var(--r-md);
    box-shadow:var(--shadow-card); padding:0; cursor:pointer; overflow:hidden; transition:all .14s var(--ease-out); display:flex; flex-direction:column; }
  .dsa-face-tile:hover{ border-color:var(--accent-gold-soft); box-shadow:var(--shadow-pop); transform:translateY(-1px); }
  .dsa-face-tile .excerpt{ background:var(--paper-2); border-bottom:1px solid var(--border-faint);
    padding:14px 15px; font:400 12.5px/1.5 var(--font-body); color:var(--ink-3); min-height:96px; }
  .dsa-face-tile .cap{ padding:12px 15px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .dsa-face-tile .name{ font:700 14px/1.2 var(--font-display); color:var(--fg-primary); }
  .dsa-face-tile .of{ font:400 11px/1.3 var(--font-body); color:var(--accent-bronze); font-style:italic; margin-top:2px; }
  .dsa-face-tile .open,.dsa-face-row .open,.dsa-face-inline .open{ font:600 12px/1 var(--font-body); color:var(--accent-gold-deep,#9F772C); background:none; border:none; cursor:pointer; }

  /* B · relational rows */
  .dsa-face-rows{ display:flex; flex-direction:column; gap:10px; }
  .dsa-face-row{ background:var(--bg-surface); border:1px solid transparent; border-radius:var(--r-md);
    box-shadow:var(--shadow-card); padding:14px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; }
  .dsa-face-row:hover{ border-color:var(--accent-gold-soft); }
  .dsa-face-row .sh{ width:18px; height:18px; flex:none; border:1.6px solid var(--accent-bronze); }
  .dsa-face-row .sh.diamond{ transform:rotate(45deg); border-radius:2px; }
  .dsa-face-row .sh.circle{ border-radius:50%; }
  .dsa-face-row .sh.hex{ clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%); background:var(--accent-bronze); border:none; }
  .dsa-face-row .conn{ flex:none; width:30px; height:0; border-top:1.5px dashed var(--accent-bronze-warm,#C09D5D); position:relative; }
  .dsa-face-row .conn::after{ content:""; position:absolute; right:-1px; top:-3px; border:3px solid transparent; border-left-color:var(--accent-bronze-warm,#C09D5D); }
  .dsa-face-row .pagechip{ flex:none; display:inline-flex; align-items:center; gap:5px; background:var(--accent-gold-50,#FBF4C8);
    border:1px solid var(--accent-gold-dashed,#D8C040); border-radius:var(--r-md); padding:5px 9px; font:600 11px/1 var(--font-body); color:var(--accent-gold-deep,#9F772C); }
  .dsa-face-row .mid{ flex:1; min-width:0; }
  .dsa-face-row .mid .name{ font:700 14px/1.2 var(--font-display); color:var(--fg-primary); }
  .dsa-face-row .mid .of{ font:400 11.5px/1.3 var(--font-body); color:var(--accent-bronze); font-style:italic; margin-top:2px; }

  /* C · inline at the thing */
  .dsa-face-inline-list{ display:flex; flex-direction:column; gap:14px; }
  .dsa-face-inline{ display:grid; grid-template-columns:1fr 220px; border:1px solid var(--border-default,#E8DFC5);
    border-radius:var(--r-lg); overflow:hidden; background:var(--bg-surface); box-shadow:var(--shadow-card); }
  .dsa-face-inline .l{ padding:18px 20px; }
  .dsa-face-inline .k{ font:600 10px/1 var(--font-body); letter-spacing:.1em; text-transform:uppercase; color:var(--accent-bronze); margin-bottom:7px; }
  .dsa-face-inline .l h4{ font:700 18px/1.15 var(--font-display); color:var(--ink); margin:0 0 8px; }
  .dsa-face-inline .l p{ font:400 13px/1.55 var(--font-body); color:var(--ink-3); margin:0 0 14px; }
  .dsa-face-inline .r{ border-left:1px solid var(--border-faint); background:var(--paper-2); padding:14px; display:flex; flex-direction:column; gap:8px; }
  .dsa-face-inline .r .cap{ font:500 10px/1 var(--font-body); letter-spacing:.06em; text-transform:uppercase; color:var(--fg-muted); }
  .dsa-face-inline .r .pageblock{ flex:1; background:var(--bg-surface); border:1px solid var(--border-default,#E8DFC5);
    border-radius:var(--r-sm); padding:12px; font:700 12px/1.3 var(--font-display); color:var(--ink); }

  /* D · lens markers */
  .dsa-face-lens{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .dsa-face-marker.lens{ position:static; }
  .dsa-face-lens .hint{ font:400 12px/1 var(--font-body); color:var(--fg-muted); font-style:italic; }
</style>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ONE ENGINE (UNIFICATION W4) — load the core solvers + bridge AS SOURCE into
     the app (the same code the DS bundle compiles), so the app renders Types
     through the one engine. No fallback: any load/parse error throws loudly.
     Sets the window.__cv* globals RenderType/Slide/the registry previews read. -->
<script>
window.__coreReady = (async () => {
  const files = ['DiagramSolver', 'ContainmentTree', 'Slide', 'RenderType'];
  for (const f of files) {
    const res = await fetch('../core/' + f + '.jsx');
    if (!res.ok) throw new Error('[core] failed to fetch core/' + f + '.jsx: ' + res.status);
    const src = await res.text();
    const stripped = src
      .replace(/^export default .*;?$/gm, '')
      .replace(/^export \{[^}]*\};?$/gm, '')
      .replace(/^export /gm, '');
    const code = Babel.transform(stripped, { presets: ['react'] }).code;
    (new Function('React', 'window', code))(window.React, window);
  }
  if (!window.__cvRenderType) throw new Error('[core] RenderType global not set after load — unification broken');
  return true;
})();
</script>
