<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover so the iOS PWA can use env(safe-area-inset-*) (notch / home indicator) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F9F7F3" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23F9F7F3'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%231A1612' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%231A1612'/%3E%3C/svg%3E" />
    <title>Instrument</title>
    <!-- The candidate "fine paper" typefaces (the S4.1 toggle flips between them). Self-fallback to
         system serif/sans so text always renders even if the CDN is slow. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Crimson+Pro:wght@400;600&family=Lora:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- THE GALLERY FACE (the first-slice drill-in render) — DNA's module + look, hosted here so its
         /api/cognition/corpus fetch is same-origin. Copied fresh from DNA's repo by scripts/sync-gallery.mjs
         (predev/prebuild). The CLASSIC script runs BEFORE the deferred React module, so window.DNA is ready
         when React mounts (avoids a StrictMode double-bind race on projection:select). -->
    <link rel="stylesheet" href="/gallery/dna-tokens.css" />
    <link rel="stylesheet" href="/gallery/phone.css" />
    <!-- DNA's organism generators (DNA.org.* — the unit→neighbour constellation hubNetwork). MUST load BEFORE
         unit-view.js, whose renderUnit calls DNA.org.hubNetwork (else the constellation renders empty in-host —
         DNA's host-wiring note 2026-06-16). A pure generator module; no global CSS, safe as a classic script. -->
    <script src="/gallery/organisms.js"></script>
    <script src="/gallery/unit-view.js"></script>
    <!-- DNA's ONE generic renderer (DNA.renderArchetype). Since the one-engine collapse (renderDecision RETIRED
         2026-06-19) the decision card draws through this; unit-view.js's renderDecisionGallery calls it at runtime.
         MUST be present or decision:// renders empty. Loaded after unit-view.js (it may use DNA.* helpers). -->
    <script src="/gallery/archetype.js"></script>
    <!-- THE FABRIC HOOKS — wildcard's interaction binder + fork's loadable-brain wire (self-wiring IIFEs,
         copied by scripts/sync-gallery.mjs from build-prep/front-interface/). Classic scripts so their
         gallery:rendered / gallery:direction listeners are registered BEFORE any user drill fires them. -->
    <!-- fork's ONE brain-turn engine — MUST load before any mount (the V brain + the gallery hooks ride it). -->
    <script src="/gallery/fork-brain-core.js"></script>
    <!-- the V / right-hand-man every-page brain mount (window.forkVBrain) — the React RHM host attaches to it. -->
    <script src="/gallery/fork-v-brain.js"></script>
    <script src="/gallery/wildcard-gallery-binder.js"></script>
    <script src="/gallery/fork-gallery-brain-hooks.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
