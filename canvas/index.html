<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>the company · operator console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0b; --panel:#101413; --line:#1f2a27; --ink:#e8efe9;
    --dim:#6f807a; --sig:#5fe3b0; --sig-dim:#2f6b59; --warn:#e8b339;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"IBM Plex Mono",monospace; font-size:14px; line-height:1.5;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px; background-position:center;
    overflow:hidden;
  }
  body::before{ /* grain + vignette */
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(120% 90% at 50% 0%,transparent 55%,rgba(0,0,0,.65));
  }
  header{
    position:relative; z-index:2; display:flex; align-items:baseline; gap:18px;
    padding:22px 30px 16px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(16,20,19,.9),rgba(16,20,19,0));
  }
  header h1{
    font-family:"Fraunces",serif; font-weight:900; font-size:26px; letter-spacing:-.5px;
    margin:0; font-optical-sizing:auto;
  }
  header h1 em{color:var(--sig); font-style:italic}
  header .sub{color:var(--dim); font-size:12px; letter-spacing:.16em; text-transform:uppercase}
  header .right{margin-left:auto; color:var(--dim); font-size:11px; letter-spacing:.12em}
  header .right b{color:var(--sig)}

  #stage{position:absolute; inset:84px 0 132px 0; z-index:1}
  svg.wires{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
  .wire{stroke:var(--sig-dim); stroke-width:1.5; fill:none}
  .wire.live{stroke:var(--sig); stroke-dasharray:5 6; animation:flow .7s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-22}}

  .node{
    position:absolute; width:268px; background:var(--panel);
    border:1px solid var(--line); border-radius:3px;
    box-shadow:0 18px 40px -24px #000, inset 0 1px 0 rgba(255,255,255,.03);
    transition:border-color .35s, transform .35s, box-shadow .35s; opacity:0;
    transform:translateY(8px);
  }
  .node.shown{opacity:1; transform:none}
  .node .bar{
    display:flex; align-items:center; gap:9px; padding:10px 13px;
    border-bottom:1px solid var(--line);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);box-shadow:0 0 0 0 transparent;transition:.3s}
  .node[data-st="ran"]{border-color:var(--sig-dim)}
  .node[data-st="ran"] .dot{background:var(--sig);box-shadow:0 0 12px 1px var(--sig)}
  .node[data-st="cached"] .dot{background:var(--warn)}
  .node .type{font-weight:600;letter-spacing:.04em}
  .node .kind{margin-left:auto;color:var(--dim);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .node .body{padding:12px 13px 13px}
  .row{display:flex;justify-content:space-between;gap:10px;margin:3px 0}
  .row .k{color:var(--dim);font-size:11px;letter-spacing:.06em}
  .row .v{color:var(--ink)}
  .out{
    margin-top:9px;padding:10px 12px;border:1px dashed var(--line);border-radius:2px;
    font-family:"Fraunces",serif;font-size:21px;font-weight:600;color:var(--sig);
    min-height:26px; transition:.3s; word-break:break-word;
  }
  .out.empty{color:var(--dim);font-family:"IBM Plex Mono";font-size:12px;font-weight:400}
  .addr{margin-top:8px;color:var(--dim);font-size:10.5px;letter-spacing:.02em;word-break:break-all}
  .addr b{color:var(--sig-dim)}
  .badge{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--line);border-radius:2px;color:var(--dim)}
  .node[data-st="ran"] .badge{color:var(--sig);border-color:var(--sig-dim)}
  .node[data-st="cached"] .badge{color:var(--warn);border-color:#5a4a1f}

  footer{
    position:absolute; left:0; right:0; bottom:0; z-index:2; height:132px;
    border-top:1px solid var(--line); padding:18px 30px;
    background:linear-gradient(0deg,rgba(16,20,19,.96),rgba(16,20,19,.4));
    display:flex; align-items:center; gap:22px;
  }
  button{
    font-family:"IBM Plex Mono";font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:var(--bg);background:var(--sig);border:none;border-radius:2px;padding:13px 26px;cursor:pointer;
    transition:.2s; box-shadow:0 0 0 0 var(--sig);
  }
  button:hover{box-shadow:0 0 22px -4px var(--sig); transform:translateY(-1px)}
  button:active{transform:none}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  button.ghost:hover{border-color:var(--sig);box-shadow:none;color:var(--sig)}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{color:var(--dim);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .field input{
    background:var(--bg);border:1px solid var(--line);color:var(--ink);
    font-family:"IBM Plex Mono";font-size:14px;padding:9px 11px;border-radius:2px;width:170px;
  }
  .field input:focus{outline:none;border-color:var(--sig)}
  #log{margin-left:auto;text-align:right;color:var(--dim);font-size:11px;max-width:42%;line-height:1.7}
  #log .sig{color:var(--sig)}
  .legend{position:absolute;top:96px;right:30px;z-index:2;color:var(--dim);font-size:10px;letter-spacing:.14em;text-transform:uppercase;text-align:right;line-height:2}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:8px;vertical-align:middle}
  /* GROW panel — governed self-growth from the operator's seat */
  .grow{position:absolute;top:150px;right:30px;z-index:3;width:340px;background:var(--panel);
    border:1px solid var(--line);border-radius:3px;padding:13px;box-shadow:0 18px 40px -24px #000}
  .grow .ghd{font-family:"Fraunces",serif;font-weight:600;font-size:14px;color:var(--sig);margin-bottom:9px}
  .grow input{display:block;width:100%;margin:5px 0;background:var(--bg);border:1px solid var(--line);
    color:var(--ink);font-family:"IBM Plex Mono";font-size:12px;padding:8px;border-radius:2px}
  .grow input:focus{outline:none;border-color:var(--sig)}
  .grow button{font-family:"IBM Plex Mono";font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--bg);background:var(--sig);border:none;border-radius:2px;padding:8px 12px;cursor:pointer;margin:6px 4px 0 0}
  .grow button.reject{background:transparent;color:var(--dim);border:1px solid var(--line)}
  #ginbox{margin-top:10px;font-size:11px;color:var(--dim);line-height:1.6}
  .surf{border:1px dashed var(--warn);border-radius:2px;padding:9px;margin-top:6px}
  .surf .shd{color:var(--warn);letter-spacing:.06em;margin-bottom:6px}
  .grow pre.code{max-height:150px;overflow:auto;background:var(--bg);border:1px solid var(--line);
    padding:8px;font-size:10.5px;color:var(--ink);white-space:pre-wrap;border-radius:2px}
  .gtypes{margin-top:11px;font-size:10px;color:var(--dim);letter-spacing:.04em;border-top:1px solid var(--line);padding-top:9px}
  .gtypes .tg{color:var(--sig);margin-right:5px}
  .err{color:#e8736b}
</style>
</head>
<body>
  <header>
    <h1>the&nbsp;<em>company</em></h1>
    <span class="sub">operator console · walking skeleton</span>
    <span class="right">substrate <b>live</b> · stage 0</span>
  </header>

  <div class="legend">
    ran <i style="background:var(--sig);box-shadow:0 0 10px var(--sig)"></i><br>
    cached (memo) <i style="background:var(--warn)"></i><br>
    idle <i style="background:var(--dim)"></i>
  </div>

  <div class="grow">
    <div class="ghd">grow · teach the system a new node</div>
    <input id="gname" placeholder="node name (e.g. wordcount)" />
    <input id="gspec" placeholder="what it should do" />
    <button id="gdispatch">dispatch build →</button>
    <div id="ginbox">the brain writes it · you approve · it goes live.</div>
    <div id="gtypes" class="gtypes"></div>
  </div>

  <div id="stage">
    <svg class="wires"><path id="wire" class="wire" d=""></path></svg>
  </div>

  <footer>
    <button id="run">▶ run composition</button>
    <div class="field">
      <label for="val">source value</label>
      <input id="val" value="hello" />
    </div>
    <button class="ghost" id="set">set &amp; observe</button>
    <div id="log">awaiting first run — nothing has resolved yet.</div>
  </footer>

<script>
const X0=120, Y0=70, GAP=360, NODE_W=268;   // nodes laid out left-to-right by index
const pos = {};                             // id -> {x,y}, computed from graph order
const stage = document.getElementById('stage');
const logEl = document.getElementById('log');
let nodesEl = {};

function log(html){ logEl.innerHTML = html; }

function render(state){
  // nodes — positioned left-to-right by their order in the graph
  state.nodes.forEach((n,i)=>{
    pos[n.id] = { x: X0 + i*GAP, y: Y0 };
    let el = nodesEl[n.id];
    if(!el){
      el = document.createElement('div');
      el.className='node';
      el.style.left = pos[n.id].x+'px'; el.style.top = pos[n.id].y+'px';
      stage.appendChild(el); nodesEl[n.id]=el;
      requestAnimationFrame(()=>el.classList.add('shown'));
    }
    el.dataset.st = n.status;
    const cfg = n.config && Object.keys(n.config).length ? JSON.stringify(n.config.value ?? n.config) : '—';
    const out = n.output==null ? '<div class="out empty">no output — not yet resolved</div>'
                               : '<div class="out">'+escapeHtml(String(n.output))+'</div>';
    const badge = n.status==='ran'?'ran':(n.status==='cached'?'cached · memo':'idle');
    el.innerHTML =
      '<div class="bar"><span class="dot"></span><span class="type">'+n.type+'</span>'
      +'<span class="kind">'+(n.kind||'node')+'</span></div>'
      +'<div class="body">'
      +'<div class="row"><span class="k">node</span><span class="v">'+n.id+'</span></div>'
      +'<div class="row"><span class="k">config</span><span class="v">'+escapeHtml(cfg)+'</span></div>'
      +'<div class="row"><span class="k">state</span><span class="badge">'+badge+'</span></div>'
      + out
      +'<div class="addr">'+ (n.address?('<b>'+n.address+'</b>'):'') + (n.content_hash?('<br>'+n.content_hash):'') +'</div>'
      +'</div>';
  });
  // wires — one per edge
  const svg=document.querySelector('svg.wires');
  svg.innerHTML='';
  const anyRan = state.nodes.some(n=>n.status==='ran');
  (state.edges||[]).forEach(e=>{
    const a=pos[e.from], b=pos[e.to]; if(!a||!b) return;
    const x1=a.x+NODE_W, y1=a.y+38, x2=b.x, y2=b.y+38, mx=(x1+x2)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('class','wire'+(anyRan?' live':''));
    p.setAttribute('d',`M ${x1} ${y1} C ${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`);
    svg.appendChild(p);
  });
  if(anyRan) setTimeout(()=>svg.querySelectorAll('.wire').forEach(w=>w.classList.remove('live')), 900);
}

function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

async function load(){ render(await (await fetch('/api/graph')).json()); }

document.getElementById('run').onclick = async ()=>{
  log('resolving… <span class="sig">presence of data at each address fires the next node</span>');
  const st = await (await fetch('/api/run',{method:'POST'})).json();
  render(st);
  const ran = st.nodes.filter(n=>n.status==='ran').map(n=>n.id);
  const cached = st.nodes.filter(n=>n.status==='cached').map(n=>n.id);
  const up = st.nodes.find(n=>n.id==='up');
  log((ran.length?('ran <span class="sig">['+ran.join(', ')+']</span> · '):'')
     +(cached.length?('skipped (memo) ['+cached.join(', ')+'] · '):'')
     +'result <span class="sig">'+escapeHtml(String(up.output))+'</span> persisted at its address.');
};
document.getElementById('set').onclick = async ()=>{
  const value = document.getElementById('val').value;
  await fetch('/api/set',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({node:'src',config:{value}})});
  render(await (await fetch('/api/graph')).json());
  log('source set to <span class="sig">"'+escapeHtml(value)+'"</span> — run to observe only the changed path re-resolve.');
};
load();

// --- GROW: governed self-growth from the operator's seat ---
const J = {'Content-Type':'application/json'};
async function refreshTypes(){
  const t = await (await fetch('/api/types')).json();
  document.getElementById('gtypes').innerHTML =
    'live node-types ('+t.length+'): '+t.map(x=>'<span class="tg">'+x+'</span>').join(' ');
}
document.getElementById('gdispatch').onclick = async ()=>{
  const name=document.getElementById('gname').value.trim(), spec=document.getElementById('gspec').value.trim();
  const ib=document.getElementById('ginbox');
  if(!name||!spec){ ib.innerHTML='enter a name and what it should do.'; return; }
  ib.innerHTML='dispatching… the brain is writing the <b>'+escapeHtml(name)+'</b> node…';
  try{
    const r=await (await fetch('/api/propose',{method:'POST',headers:J,body:JSON.stringify({name,spec})})).json();
    if(r.error){ ib.innerHTML='<span class="err">'+escapeHtml(r.error)+'</span>'; return; }
    ib.innerHTML='<div class="surf"><div class="shd">⚠ surfaced for your approval · '+r.id+'</div>'
      +'<pre class="code">'+escapeHtml(r.code)+'</pre>'
      +'<button class="approve">✓ approve &amp; apply</button>'
      +'<button class="reject">✕ reject</button></div>';
    ib.querySelector('.approve').onclick=()=>approveApply(r.id);
    ib.querySelector('.reject').onclick=async()=>{
      await fetch('/api/resolve',{method:'POST',headers:J,body:JSON.stringify({id:r.id,choice:'reject'})});
      ib.innerHTML='rejected — not applied.'; };
  }catch(e){ ib.innerHTML='<span class="err">'+e+'</span>'; }
};
async function approveApply(id){
  const ib=document.getElementById('ginbox');
  await fetch('/api/resolve',{method:'POST',headers:J,body:JSON.stringify({id,choice:'approve'})});  // OPERATOR approves
  const r=await (await fetch('/api/apply',{method:'POST',headers:J,body:JSON.stringify({id})})).json();
  if(r.error){ ib.innerHTML='<span class="err">'+escapeHtml(r.error)+'</span>'; return; }
  ib.innerHTML='<span class="sig">✓ approved + applied → <b>'+r.path.split('/').pop()+'</b> is now a live node-type.</span>';
  refreshTypes();
}
refreshTypes();
</script>
</body>
</html>
